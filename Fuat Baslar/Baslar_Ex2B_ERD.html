<style>
body {
  margin: 0;
  padding: 24px;
  background: #1a1a1a;
  font-family: 'Anthropic Sans', sans-serif;
}
h1 {
  color: #ffffff;
  text-align: center;
  font-size: 22px;
  font-weight: 500;
  margin: 0 0 24px 0;
}
#erd svg { max-width: 100%; }
</style>
<h1>Dog Walking Business — ER Diagram</h1>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: '#b0b0b0',
    textColor: '#000000',
    attributeBackgroundColorOdd: '#d0e4fc',
    attributeBackgroundColorEven: '#b5d4f4',
    nodeBorder: '#4a90d9',
    mainBkg: '#e6f1fb',
    titleColor: '#000000',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  CUSTOMERS ||--o{ DOGS : owns
  CUSTOMERS ||--o{ PAYMENTS : makes
  DOGS ||--o{ WALKS : "goes on"
  WALKERS ||--o{ WALKS : completes

  CUSTOMERS {
    int customer_id PK
    string first_name
    string last_name
    string phone
    string email
    string address
  }

  DOGS {
    int dog_id PK
    string dog_name
    string breed
    int age
    decimal weight
    int customer_id FK
  }

  WALKERS {
    int walker_id PK
    string first_name
    string last_name
    string phone
    string email
  }

  WALKS {
    int walk_id PK
    int dog_id FK
    int walker_id FK
    date walk_date
    time walk_time
    int duration_minutes
    string notes
  }

  PAYMENTS {
    int payment_id PK
    int customer_id FK
    decimal amount
    date payment_date
    string payment_method
  }
`);
document.getElementById('erd').innerHTML = svg;

// Round outer entity boxes
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

// Force ALL text black
document.querySelectorAll('#erd svg text').forEach(t => {
  t.style.setProperty('fill', '#000000', 'important');
});

// Relationship label backgrounds dark so white text works
document.querySelectorAll('#erd svg .er-label rect, #erd svg .edgeLabel rect').forEach(r => {
  r.style.setProperty('fill', '#1a1a1a', 'important');
  r.style.setProperty('stroke', 'none', 'important');
});
document.querySelectorAll('#erd svg .er-label text, #erd svg .edgeLabel text').forEach(t => {
  t.style.setProperty('fill', '#ffffff', 'important');
});

// Remove row borders
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
